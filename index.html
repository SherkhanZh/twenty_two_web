    <!-- City Modal (hidden for now, together with the header city button)
    <div class="modal" id="city-modal" role="dialog" aria-modal="true" aria-labelledby="city-title" aria-hidden="true">
      <div class="modal-overlay" data-close="city-modal"></div>
      <div class="modal-card" role="document">
        <div class="modal-header">
          <h2 id="city-title" data-i18n="modal.city_title">Choose city</h2>
          <button class="modal-close" type="button" aria-label="Close" data-close="city-modal">×</button>
        </div>
        <div class="modal-body">
          <div class="option-grid" data-group="city">
            <button type="button" class="option" data-value="almaty" data-i18n="cities.almaty">Almaty</button>
            <button type="button" class="option" data-value="astana" data-i18n="cities.astana">Astana</button>
          </div>
        </div>
      </div>
    </div>
    -->

    <script>
      (function () {
        function openModal(id) {
          var modal = document.getElementById(id);
          if (!modal) return;
          modal.setAttribute('aria-hidden', 'false');
          modal.classList.add('open');
          document.body.style.overflow = 'hidden';
        }

        function closeModal(id) {
          var modal = document.getElementById(id);
          if (!modal) return;
          modal.setAttribute('aria-hidden', 'true');
          modal.classList.remove('open');
          document.body.style.overflow = '';
        }

        // Language toggle
        var langToggle = document.getElementById('lang-toggle');
        if (langToggle) {
          langToggle.addEventListener('click', function (e) {
            var t = e.target;
            if (t instanceof Element && t.hasAttribute('data-lang')) {
              window.applyLanguage && window.applyLanguage(t.getAttribute('data-lang'));
            }
          });
        }

        // City button hidden for now
        var openCityBtn = document.getElementById('open-city');
        if (openCityBtn) openCityBtn.addEventListener('click', function () { openModal('city-modal'); });

        // Close via overlay or close button
        document.addEventListener('click', function (e) {
          var target = e.target;
          if (!(target instanceof Element)) return;
          // (removed) embedded PDF handler
          var closeId = target.getAttribute('data-close');
          if (closeId) {
            closeModal(closeId);
          }
        });

        // Escape key closes topmost open modal
        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape') {
            var openModalEl = document.querySelector('.modal.open');
            if (openModalEl && openModalEl.id) closeModal(openModalEl.id);
          }
        });

        // Selection handling
        function handleSelection(group, value) {
          if (group === 'city') {
            if (window.applyCity) window.applyCity(value);
            closeModal('city-modal');
          }
        }

        document.addEventListener('click', function (e) {
          var target = e.target;
          if (!(target instanceof Element)) return;
          if (target.classList.contains('option')) {
            var parent = target.closest('.option-grid');
            if (!parent) return;
            var group = parent.getAttribute('data-group') || '';
            var value = target.getAttribute('data-value') || target.textContent.trim();
            handleSelection(group, value);
          }
        });
      })();
    </script>

    

    <script>
      // Inline i18n maps as local fallback (works over file://)
      window.INLINE_I18N = {
        en: {
          nav: { main: "Main Page", cafes: "Cafes and Restaurants", about: "About Us", partners: "For Partners" },
          footer: { privacy: "Privacy Policy", offer: "Terms of Use", address: "Republic of Kazakhstan, Almaty, Kasteev street 91, +77788002044" },
          modal: { language_title: "Choose language", city_title: "Choose city" },

        },
        ru: {
          nav: { main: "Главная", cafes: "Кафе и рестораны", about: "О нас", partners: "Партнёрам" },
          footer: { privacy: "Политика конфиденциальности", offer: "Пользовательское соглашение", address: "Республика Казахстан, город Алматы, улица Кастеева 90, +77788002044" },
          modal: { language_title: "Выберите язык", city_title: "Выберите город" },
          cities: { almaty: "Алматы", astana: "Астана" }
        },
        kk: {

          footer: { privacy: "Құпиялылық саясаты", offer: "Пайдаланушылық келісім", address: "Қазақстан Республикасы, Алматы қаласы, Қастеев көшесі 91, +77788002044" },
          modal: { language_title: "Тілді таңдаңыз", city_title: "Қаланы таңдаңыз" },

    <script>
      // Simple i18n loader with persistence and city localization
      (function () {
        var stored = null;
        try { stored = localStorage.getItem('lang'); } catch (e) {}
        var currentLang = stored || 'kk';
        var storedCity = null;
        try { storedCity = localStorage.getItem('city'); } catch (e) {}
        var currentCity = storedCity || 'almaty';

        function setText(el, text) {
          if (el) el.textContent = text;
        }

        function setPlaceholder(el, text) {
          if (el) el.setAttribute('placeholder', text);
        }

        function t(map, key) {
          return key && key.split('.').reduce(function (acc, part) {
            return acc && acc[part];
          }, map);
        }

        function applyTranslations(map) {
          window.__lastTranslations = map;
          document.querySelectorAll('[data-i18n]').forEach(function (el) {
            var key = el.getAttribute('data-i18n');
            var value = t(map, key);
            if (typeof value === 'string') setText(el, value);
          });
          document.querySelectorAll('[data-i18n-placeholder]').forEach(function (el) {
            var key = el.getAttribute('data-i18n-placeholder');
            var value = t(map, key);
            if (typeof value === 'string') setPlaceholder(el, value);
          });
          // Update city button label
          var cityBtn = document.getElementById('open-city');
          if (cityBtn) {
            var cityLabel = t(map, 'cities.' + currentCity) || currentCity;
            cityBtn.textContent = cityLabel + ' ▾';
          }
        }

        function loadLang(lang) {
          // Prefer inline to avoid file protocol fetch issues
          if (window.INLINE_I18N && window.INLINE_I18N[lang]) {
            return Promise.resolve(window.INLINE_I18N[lang]);
          }
          return fetch('assets/i18n/' + lang + '.json').then(function (r) { return r.json(); });
        }

        function applyLanguage(lang) {
          currentLang = lang;
          try { localStorage.setItem('lang', lang); } catch (e) {}
          loadLang(lang).then(function (map) {
            applyTranslations(map);
            // sync toggle active state
            document.querySelectorAll('#lang-toggle .lang-option').forEach(function (b) {
              b.classList.toggle('active', b.getAttribute('data-lang') === lang);
            });
          }).catch(function () {
            // fallback to English
            if (lang !== 'en') loadLang('en').then(function (m) {
              applyTranslations(m);
            });
          });
        }

        function applyCity(cityKey) {
          currentCity = cityKey;
          try { localStorage.setItem('city', cityKey); } catch (e) {}
          loadLang(currentLang).then(function (map) {
            var cityBtn = document.getElementById('open-city');
            if (cityBtn) {
              var cityLabel = t(map, 'cities.' + currentCity) || cityKey;
              cityBtn.textContent = cityLabel + ' ▾';
            }
          });
        }

        window.applyLanguage = applyLanguage;
        window.applyCity = applyCity;
        // Initialize with stored or defaults
        applyLanguage(currentLang);
        applyCity(currentCity);
      })();
    </script>

    <script>
      // Mascot frame animation
      (function () {
        var frames = [
          'assets/mascot.png',
          'assets/mascot2.png',
          'assets/mascot3.png',
          'assets/mascot7.png',
          'assets/mascot8.png'
        ];
        // Preload images
        frames.forEach(function (src) {
          var img = new Image();
          img.src = src;
        });

        var idx = 0;
        var el = document.getElementById('mascot');
        if (!el) return;

        function nextFrame() {
          idx = (idx + 1) % frames.length;
          el.src = frames[idx];
        }

        var interval = setInterval(nextFrame, 160);

        // Pause on hover for accessibility
        el.addEventListener('mouseenter', function () { clearInterval(interval); });
        el.addEventListener('mouseleave', function () { interval = setInterval(nextFrame, 160); });
      })();
    </script>
  </body>
  </html>
